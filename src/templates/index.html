{% extends "layout.html" %}

{% block content %}
  {% for post in posts %}
    <div class="post-container">
      <h2>{{ post.title }}</h2>
      <p>{{ post.content }}</p>
      <span>{{ post.created_at.strftime("%A, %B %d, %Y") }}</span>
      <a href="{{ url_for('post_detail', post_id=post.id) }}">Ver mais</a>
    </div>
  {% endfor %}
{% endblock %}
